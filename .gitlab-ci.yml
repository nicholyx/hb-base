#$schema: https://gitlab.com/gitlab-org/gitlab/-/raw/v14.4.0-ee/app/assets/javascripts/editor/schema/ci.json

include:
  - project: "standard/cicd"
    ref: v1
    file:
      - "/standard/common.yml"

Build:
  script:
    - echo "Building $CI_PROJECT_NAME"
  extends: .build_manual

# ============================================================
# 多平台构建：使用 cibuildwheel 为 Linux/macOS/Windows 分别编译
# 产物输出到 wheelhouse/ 目录
# ============================================================

Build Linux:
  stage: build
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y gcc build-essential
    - pip install cibuildwheel cython
    - cibuildwheel --platform linux
  artifacts:
    paths:
      - wheelhouse/
  rules:
    - if: $CI_COMMIT_TAG

# macOS 构建需要 macOS Runner（带 macos tag）
# 如果没有 macOS Runner，此 job 会被跳过
Build macOS:
  stage: build
  tags:
    - macos
  script:
    - pip install cibuildwheel cython
    - cibuildwheel --platform macos
  artifacts:
    paths:
      - wheelhouse/
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true

# Windows 构建需要 Windows Runner（带 windows tag）
# 如果没有 Windows Runner，此 job 会被跳过
Build Windows:
  stage: build
  tags:
    - windows
  script:
    - pip install cibuildwheel cython
    - cibuildwheel --platform windows
  artifacts:
    paths:
      - wheelhouse/
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ============================================================
# 发布：收集所有平台的 wheel，统一发布到 Package Registry
# ============================================================

Publish:
  stage: deploy
  image: python:3.12-slim
  script:
    - pip install twine
    - ls wheelhouse/
    - twine upload --repository gitlab wheelhouse/*.whl
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: Build Linux
    - job: Build macOS
      optional: true
    - job: Build Windows
      optional: true
